services:
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_DB: researchops
      POSTGRES_USER: researchops
      POSTGRES_PASSWORD: researchops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchops -d researchops"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://researchops:researchops@postgres:5432/researchops
      FRONTEND_ORIGIN: http://localhost:5173
      STORAGE_DIR: /app/storage/uploads
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER:-researchops-documents}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_STORAGE_ACCOUNT_URL: ${AZURE_STORAGE_ACCOUNT_URL:-}
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:-}
      AZURE_DOCUMENT_INTELLIGENCE_KEY: ${AZURE_DOCUMENT_INTELLIGENCE_KEY:-}
      AZURE_SEARCH_ENDPOINT: ${AZURE_SEARCH_ENDPOINT:-}
      AZURE_SEARCH_API_KEY: ${AZURE_SEARCH_API_KEY:-}
      AZURE_SEARCH_INDEX_NAME: ${AZURE_SEARCH_INDEX_NAME:-researchops-document-chunks}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-10-21}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-text-embedding-3-small}
      AZURE_OPENAI_EMBEDDING_DIMENSIONS: ${AZURE_OPENAI_EMBEDDING_DIMENSIONS:-1536}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${AZURE_OPENAI_CHAT_DEPLOYMENT:-gpt-4o-mini}
      AUTH_MODE: ${AUTH_MODE:-development}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
      ENTRA_AUDIENCE: ${ENTRA_AUDIENCE:-}
      ENTRA_REQUIRED_SCOPE: ${ENTRA_REQUIRED_SCOPE:-access_as_user}
      DEV_DEFAULT_USER_EMAIL: ${DEV_DEFAULT_USER_EMAIL:-demo.researchops@example.test}
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz', timeout=2)",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.extraction.worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://researchops:researchops@postgres:5432/researchops
      STORAGE_DIR: /app/storage/uploads
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER:-researchops-documents}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_STORAGE_ACCOUNT_URL: ${AZURE_STORAGE_ACCOUNT_URL:-}
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:-}
      AZURE_DOCUMENT_INTELLIGENCE_KEY: ${AZURE_DOCUMENT_INTELLIGENCE_KEY:-}
    depends_on:
      backend:
        condition: service_healthy

  indexer:
    build:
      context: ./backend
    command: ["python", "-m", "app.search.worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://researchops:researchops@postgres:5432/researchops
      STORAGE_DIR: /app/storage/uploads
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER:-researchops-documents}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_STORAGE_ACCOUNT_URL: ${AZURE_STORAGE_ACCOUNT_URL:-}
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:-}
      AZURE_DOCUMENT_INTELLIGENCE_KEY: ${AZURE_DOCUMENT_INTELLIGENCE_KEY:-}
      AZURE_SEARCH_ENDPOINT: ${AZURE_SEARCH_ENDPOINT:-}
      AZURE_SEARCH_API_KEY: ${AZURE_SEARCH_API_KEY:-}
      AZURE_SEARCH_INDEX_NAME: ${AZURE_SEARCH_INDEX_NAME:-researchops-document-chunks}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-10-21}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-text-embedding-3-small}
      AZURE_OPENAI_EMBEDDING_DIMENSIONS: ${AZURE_OPENAI_EMBEDDING_DIMENSIONS:-1536}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${AZURE_OPENAI_CHAT_DEPLOYMENT:-gpt-4o-mini}
      AUTH_MODE: ${AUTH_MODE:-development}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
      ENTRA_AUDIENCE: ${ENTRA_AUDIENCE:-}
      ENTRA_REQUIRED_SCOPE: ${ENTRA_REQUIRED_SCOPE:-access_as_user}
      DEV_DEFAULT_USER_EMAIL: ${DEV_DEFAULT_USER_EMAIL:-demo.researchops@example.test}
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
