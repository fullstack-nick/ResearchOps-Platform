name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: researchops-vt1zhh-rg
  AZURE_ACR_NAME: researchopsacrvt1zhh
  BACKEND_IMAGE: researchops-backend
  FRONTEND_IMAGE: researchops-frontend
  BACKEND_APP: researchops-vt1zhh-backend
  WORKER_APP: researchops-vt1zhh-worker
  INDEXER_APP: researchops-vt1zhh-indexer
  MCP_APP: researchops-vt1zhh-mcp
  FRONTEND_APP: researchops-vt1zhh-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Compute image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "$AZURE_ACR_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.AZURE_ACR_NAME }}.azurecr.io/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.AZURE_ACR_NAME }}.azurecr.io/${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile.prod
          push: true
          build-args: |
            VITE_API_BASE_URL=
          tags: |
            ${{ env.AZURE_ACR_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.AZURE_ACR_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update backend revision
        run: |
          az containerapp update \
            --name "$BACKEND_APP" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$AZURE_ACR_NAME.azurecr.io/$BACKEND_IMAGE:${{ needs.build-and-push.outputs.image_tag }}"

      - name: Update worker revision
        run: |
          az containerapp update \
            --name "$WORKER_APP" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$AZURE_ACR_NAME.azurecr.io/$BACKEND_IMAGE:${{ needs.build-and-push.outputs.image_tag }}"

      - name: Update indexer revision
        run: |
          az containerapp update \
            --name "$INDEXER_APP" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$AZURE_ACR_NAME.azurecr.io/$BACKEND_IMAGE:${{ needs.build-and-push.outputs.image_tag }}"

      - name: Update MCP revision
        run: |
          az containerapp update \
            --name "$MCP_APP" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$AZURE_ACR_NAME.azurecr.io/$BACKEND_IMAGE:${{ needs.build-and-push.outputs.image_tag }}"

      - name: Update frontend revision
        run: |
          az containerapp update \
            --name "$FRONTEND_APP" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$AZURE_ACR_NAME.azurecr.io/$FRONTEND_IMAGE:${{ needs.build-and-push.outputs.image_tag }}"

      - name: Smoke test backend /healthz
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -fsSL "https://$BACKEND_APP.salmonplant-ccdabe77.eastus.azurecontainerapps.io/healthz"; then
              echo "Backend healthy"; exit 0;
            fi
            echo "Attempt $i: backend not yet ready, retrying..."; sleep 20;
          done
          echo "Backend health check failed"; exit 1
